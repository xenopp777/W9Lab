<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grocery List</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./src/css/styles.css">
<!-- Edited by Zoie D 4/23/26 -->
</head>
<body>
  <div class="navbar navbar-expand-sm bg-dark">
    <div class="container-fluid">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link text-white" href="#">Grocery List</a>
        </li>
      </ul>
    </div>
  </div>
  <div class="container mt-4">
    <div class="row">
      <div class="col-sm-2"></div>
      <div class="col-sm-8">
        <h2>Grocery Items</h2>

        <form class="grocery-form mb-4">
          <div class="row">
            <div class="col-sm-6 mb-2">
              <input id="itemName" type="text" class="form-control" placeholder="Item Name" required>
            </div>
            <div class="col-sm-4 mb-2">
              <input id="quantity" type="text" class="form-control" placeholder="Quantity" required>
            </div>
            <div class="col-sm-2 mb-2">
              <button type="submit" class="btn btn-primary w-100">Add</button>
            </div>
          </div>
        </form>

        <div class="grocery-list list-group"></div>
      </div>
      <div class="col-sm-2"></div>
    </div>
  </div>

  <script type="module" src="./src/js/index.js"></script>
</body>
</html>
